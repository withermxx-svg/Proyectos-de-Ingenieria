<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Alcudia | Ingeniería & Desarrollo</title>
    <!-- Tailwind CSS para Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecución en navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #080c14; 
            color: #e2e8f0;
            overflow-x: hidden;
            width: 100%;
        }

        .canvas-container { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 0; 
            opacity: 0.5; 
        }

        .text-gradient { 
            background: linear-gradient(to right, #60a5fa, #22d3ee, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding-right: 0.4em; /* Previene corte de itálica en la 'a' final */
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (min-width: 768px) {
            .glass-card:hover {
                background: rgba(255, 255, 255, 0.06);
                border-color: rgba(59, 130, 246, 0.3);
                transform: translateY(-8px);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            }
        }

        .modal-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(12px); }
        .zoom-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); z-index: 150; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080c14; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .video-container video {
            width: 100%;
            height: auto;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero-title {
            padding-right: 0.4em;
            display: block;
            width: fit-content;
            line-height: 0.9;
        }
        
        .image-zoom-cursor { cursor: zoom-in; }

        /* Botones de contacto optimizados */
        .contact-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            width: 100%;
            border-radius: 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        @media (min-width: 1024px) { .contact-btn { width: fit-content; padding-right: 2rem; } }

        .contact-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .contact-icon-box {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .contact-btn:hover .contact-icon-box.mail { background: rgba(37, 99, 235, 0.2); color: #60a5fa; }
        .contact-btn:hover .contact-icon-box.whatsapp { background: rgba(22, 163, 74, 0.2); color: #4ade80; }
        .contact-btn:hover .contact-icon-box.linkedin { background: rgba(2, 132, 199, 0.2); color: #38bdf8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const CanvasBackground = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationId;
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize);
                resize();
                const particles = Array.from({ length: 50 }, () => ({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2, size: Math.random() * 1.5 + 1
                }));
                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                    ctx.strokeStyle = 'rgba(59, 130, 246, 0.03)';
                    particles.forEach((p, i) => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                        for (let j = i + 1; j < particles.length; j++) {
                            const p2 = particles[j];
                            const d = Math.hypot(p.x - p2.x, p.y - p2.y);
                            if (d < 120) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                        }
                    });
                    animationId = requestAnimationFrame(draw);
                };
                draw();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationId); };
            }, []);
            return <canvas ref={canvasRef} className="canvas-container" />;
        };

        const PROJECTS_DATA = [
            { id: 1, category: 'Software', title: 'Programación con IA', icon: 'code-2', desc: 'Desarrollo de scripts inteligentes y automatización con modelos LLM.', details: 'Python, APIs de OpenAI y flujos autónomos.', media: ['https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=800'] },
            { id: 2, category: 'Software', title: 'Creación de Apps', icon: 'smartphone', desc: 'Interfaces modernas web y móviles con React.', details: 'Desarrollo Frontend y UX focalizada.', media: ['https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?auto=format&fit=crop&q=80&w=800'] },
            { id: 3, category: 'Mantenimiento', title: 'Soporte Técnico PC', icon: 'monitor', desc: 'Reparación de hardware y diagnósticos profundos.', details: 'Mantenimiento preventivo y correctivo de alto nivel.', media: [] },
            { id: 4, category: 'Automatización', title: 'Automatización e IA', icon: 'bot', desc: 'Sistemas autónomos para procesos industriales.', details: 'Lógica programable y visión artificial.', media: [] },
            { id: 5, category: 'Mantenimiento', title: 'Servicio Periféricos', icon: 'wrench', desc: 'Mantenimiento de impresoras y equipos de oficina.', details: 'Reparación de sistemas de alimentación.', media: [] },
            { id: 6, category: 'Diseño', title: 'Modelado 3D', icon: 'box', desc: 'Diseño paramétrico en Autodesk Inventor.', details: 'Prototipado virtual y análisis de esfuerzos.', media: [] },
            { id: 7, category: 'Diseño', title: 'Planos CAD 2D', icon: 'pen-tool', desc: 'Planos técnicos y diagramas eléctricos.', details: 'Ingeniería de detalle para instalaciones.', media: [] },
            { id: 8, category: 'Documentación', title: 'Redacción Técnica', icon: 'file-text', desc: 'Informes de ingeniería y reportes técnicos.', details: 'Manuales de operación y documentación rigurosa.', media: [] }
        ];

        // --- DATOS DE CERTIFICADOS (Basados en tus capturas) ---
        const CERTIFICATES_DATA = [
            { 
                id: 1, 
                title: 'Desarrollo con IA', 
                issuer: 'BIG School', 
                media: ['https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=1470'], 
                desc: 'Curso de iniciación al desarrollo con Inteligencia Artificial. Jornadas formativas técnicas.' 
            },
            { 
                id: 2, 
                title: 'Advanced Innovation', 
                issuer: 'ASU & UAG', 
                media: ['https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1472'], 
                desc: 'Certificación internacional en procesos de innovación avanzada y pensamiento estratégico.' 
            },
            { 
                id: 3, 
                title: 'Internet de las Cosas', 
                issuer: 'Santander / MIT Professional Education', 
                media: ['https://images.unsplash.com/photo-1558346490-a72e53ae2d4f?q=80&w=1470'], 
                desc: 'Especialización en sistemas IoT, sensores integrados y conectividad inteligente.' 
            },
            { 
                id: 4, 
                title: 'White Belt Lean Six Sigma', 
                issuer: 'UAG (C.I.S.)', 
                media: ['https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=1470'], 
                desc: 'Metodologías de mejora de procesos industriales y reducción de variabilidad.' 
            },
            { 
                id: 5, 
                title: 'Stress Management for Wellness', 
                issuer: 'ASU / UAG', 
                media: ['https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=1470'], 
                desc: 'Formación en habilidades blandas aplicadas al entorno profesional y gestión de alto rendimiento.' 
            },
            { 
                id: 6, 
                title: 'Certificación Técnica Extra', 
                issuer: 'Alan Alcudia', 
                media: [], 
                desc: 'Próxima acreditación en proceso de documentación técnica.' 
            }
        ];

        const FullScreenZoom = ({ src, onClose }) => (
            <div className="fixed inset-0 zoom-overlay flex items-center justify-center p-2 cursor-zoom-out z-[200]" onClick={onClose}>
                <button className="absolute top-4 right-4 text-white bg-white/10 p-3 rounded-full"><Icon name="x" /></button>
                <img src={src} alt="Zoom" className="max-w-full max-h-full object-contain rounded-lg shadow-2xl" />
            </div>
        );

        const ProjectModal = ({ project, onClose }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [zoomImage, setZoomImage] = useState(null);
            if (!project) return null;

            const isVideo = (url) => url.toLowerCase().endsWith('.mp4') || url.toLowerCase().endsWith('.webm');
            const nextMedia = () => setCurrentIndex((prev) => (prev + 1) % project.media.length);
            const prevMedia = () => setCurrentIndex((prev) => (prev - 1 + project.media.length) % project.media.length);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-8 overflow-y-auto">
                    <div className="fixed inset-0 modal-overlay" onClick={onClose}></div>
                    {zoomImage && <FullScreenZoom src={zoomImage} onClose={() => setZoomImage(null)} />}

                    <div className="relative bg-[#0f172a] border border-white/10 w-full max-w-6xl rounded-[2rem] overflow-hidden flex flex-col md:flex-row shadow-2xl h-auto max-h-[95vh] md:h-[80vh]">
                        <button onClick={onClose} className="absolute top-4 right-4 z-20 w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white"><Icon name="x" className="w-5 h-5" /></button>
                        
                        <div className="flex-1 bg-black/40 flex items-center justify-center p-4 md:p-8 relative min-h-[250px] group/gallery">
                            {project.media && project.media.length > 0 ? (
                                <div className="relative w-full h-full flex flex-col items-center justify-center">
                                    {isVideo(project.media[currentIndex]) ? (
                                        <div className="video-container w-full max-w-3xl"><video key={project.media[currentIndex]} autoPlay loop muted playsInline controls><source src={project.media[currentIndex]} type="video/mp4" /></video></div>
                                    ) : (
                                        <img src={project.media[currentIndex]} className="max-w-full max-h-[40vh] md:max-h-[70vh] object-contain image-zoom-cursor rounded-lg" onClick={() => setZoomImage(project.media[currentIndex])} />
                                    )}
                                    {project.media.length > 1 && (
                                        <div className="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-2 pointer-events-none">
                                            <button onClick={(e) => {e.stopPropagation(); prevMedia();}} className="pointer-events-auto w-10 h-10 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center"><Icon name="chevron-left" /></button>
                                            <button onClick={(e) => {e.stopPropagation(); nextMedia();}} className="pointer-events-auto w-10 h-10 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center"><Icon name="chevron-right" /></button>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="text-center opacity-40"><Icon name="image-off" className="w-12 h-12 mx-auto mb-2" /><p className="text-xs italic">Evidencia técnica en proceso...</p></div>
                            )}
                        </div>
                        
                        <div className="w-full md:w-[400px] p-6 md:p-10 flex flex-col bg-gradient-to-b from-white/[0.04] to-transparent border-t md:border-t-0 md:border-l border-white/5 overflow-y-auto">
                            <span className="inline-block w-fit px-2 py-0.5 bg-blue-500/10 border border-blue-500/20 rounded-full text-blue-400 text-[9px] font-black uppercase tracking-widest mb-4">{project.issuer ? 'Acreditación' : (project.category || 'Servicio')}</span>
                            <h3 className="text-2xl md:text-3xl font-black text-white mb-4 leading-tight">{project.title}</h3>
                            <div className="space-y-6 mb-8 text-sm">
                                <p className="text-slate-300 leading-relaxed">{project.desc}</p>
                                <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                                    <h4 className="text-[10px] font-black text-blue-400 uppercase mb-2">{project.issuer ? 'Emisor' : 'Especificaciones'}</h4>
                                    <p className="text-slate-400 text-xs italic">{project.issuer || project.details}</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="mt-auto w-full bg-blue-600 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 transition-colors">Cerrar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [filter, setFilter] = useState('Todos');
            const [scrolled, setScrolled] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);
            
            const myUrl = "https://alanalcudiaasencio.netlify.app/";
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(myUrl)}&bgcolor=ffffff&color=080c14&margin=10`;

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const filteredProjects = useMemo(() => filter === 'Todos' ? PROJECTS_DATA : PROJECTS_DATA.filter(p => p.category === filter), [filter]);

            return (
                <div className="relative z-10">
                    <CanvasBackground />
                    {selectedProject && <ProjectModal project={selectedProject} onClose={() => setSelectedProject(null)} />}

                    {/* Navegación */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'bg-[#080c14]/90 backdrop-blur-md py-3 border-b border-white/5' : 'py-5 md:py-8'}`}>
                        <div className="container mx-auto px-5 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="relative"><div className="w-2 h-2 bg-green-500 rounded-full absolute -top-0.5 -right-0.5 border border-[#080c14] animate-pulse"></div><Icon name="hammer" className="w-4 h-4 text-blue-400" /></div>
                                <span className="text-[10px] font-bold text-slate-100 uppercase tracking-wider">Disponible</span>
                            </div>
                            <div className="flex gap-4 md:gap-8 text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                                <a href="#" className="hover:text-blue-400 transition-colors">Inicio</a>
                                <a href="#proyectos" className="hover:text-blue-400 transition-colors">Servicios</a>
                                <a href="#certificados" className="hover:text-blue-400 transition-colors">Certificados</a>
                                <a href="#contacto" className="hover:text-blue-400 transition-colors">Contacto</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="container mx-auto px-6 pt-28 pb-16 md:pt-52 md:pb-36 flex flex-col md:flex-row items-center gap-10 md:gap-16">
                        <div className="flex-1 text-center md:text-left order-2 md:order-1 overflow-visible">
                            <h1 className="hero-title text-5xl sm:text-7xl md:text-8xl lg:text-[100px] font-black text-white tracking-tighter mb-4 italic mx-auto md:mx-0">
                                Alan <br/><span className="text-gradient">Alcudia</span>
                            </h1>
                            <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-blue-500/10 border border-blue-500/20 rounded-full text-blue-400 text-[10px] font-black tracking-widest mb-8 md:mb-12 uppercase"><Icon name="zap" className="w-3 h-3" /> Mecatrónico & Dev</div>
                            <p className="text-base md:text-xl text-slate-400 max-w-xl mb-10 md:mb-14 leading-relaxed border-l-2 md:border-l-4 border-blue-600 pl-5 md:pl-8 italic">"Diseñando soluciones técnicas, automatizando procesos con IA y brindando soporte de ingeniería especializado."</p>
                            <div className="flex flex-wrap gap-4 justify-center md:justify-start">
                                <a href="#proyectos" className="bg-blue-600 text-white px-8 md:px-12 py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-blue-600/20 hover:scale-105 transition-transform">Ver Portafolio</a>
                                <a href="#contacto" className="bg-white/5 border border-white/10 text-white px-8 md:px-12 py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-white/10 transition-colors">Contactar</a>
                            </div>
                        </div>
                        <div className="relative order-1 md:order-2">
                            <div className="absolute inset-0 bg-blue-600/20 blur-[80px] md:blur-[130px] rounded-full animate-pulse"></div>
                            <div className="relative z-10 p-2 md:p-4 bg-gradient-to-br from-white/15 to-transparent rounded-[2.5rem] md:rounded-[4rem] border border-white/10 backdrop-blur-sm">
                                <img src="https://i.ibb.co/xKKQd3vx/PHOTO.png" alt="Alan Alcudia" className="w-56 h-56 sm:w-72 sm:h-72 md:w-[450px] md:h-[450px] object-cover rounded-[2rem] md:rounded-[3.5rem] shadow-2xl" />
                            </div>
                        </div>
                    </header>

                    {/* Proyectos e Interactividad */}
                    <section id="proyectos" className="container mx-auto px-6 py-20 md:py-40">
                        <div className="flex flex-col lg:flex-row justify-between items-center md:items-end mb-16 md:mb-28 gap-8 md:gap-12 text-center md:text-left">
                            <div className="max-w-2xl"><h2 className="text-[10px] text-blue-500 font-black uppercase tracking-[0.4em] mb-4 italic">Especialización</h2><h3 className="text-4xl md:text-6xl font-black text-white mb-6">Mis Trabajos</h3><p className="text-slate-400 text-base md:text-lg leading-relaxed">Haz clic en cualquier tarjeta para abrir la galería multimedia y ver detalles técnicos.</p></div>
                            <div className="flex flex-wrap justify-center gap-2 bg-white/5 p-1.5 rounded-2xl border border-white/10">
                                {['Todos', 'Software', 'Mantenimiento', 'Diseño'].map(c => (
                                    <button key={c} onClick={()=>setFilter(c)} className={`px-4 md:px-8 py-2 rounded-xl text-[9px] md:text-[10px] font-black uppercase tracking-widest transition-all ${filter===c?'bg-blue-600 text-white shadow-lg':'text-slate-500 hover:text-white'}`}>{c}</button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">

                                        </div>
