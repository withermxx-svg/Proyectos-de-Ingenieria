    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #080c14; 
            color: #e2e8f0;
            overflow-x: hidden;
            width: 100%;
        }

        .canvas-container { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 0;

        }

        .text-gradient { 
            background: linear-gradient(to right, #60a5fa, #22d3ee, #3b82f6);

            display: inline-block;
            padding-right: 0.45em; /* Espacio para que la 'a' itálica de Alcudia no se corte */
        }

        .hero-title {

        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);

        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(12px); }
        
        ::-webkit-scrollbar { width: 6px; }

        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .contact-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
            width: 100%;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;

        .contact-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.4);
        }

        /* Animación de entrada */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTE ICONO ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- FONDO ANIMADO ---
        const CanvasBackground = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationId;
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize);
                resize();
                const particles = Array.from({ length: 45 }, () => ({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2, size: Math.random() * 1.5 + 1
                }));
                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                    particles.forEach((p) => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    });
                    animationId = requestAnimationFrame(draw);
                };
                draw();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationId); };
            }, []);
            return <canvas ref={canvasRef} className="canvas-container" />;
        };

        // --- DATOS DE EVIDENCIA TÉCNICA ---
        const EVIDENCE_GALLERY = [

            },
            { 
                id: 'pc-2', 
                category: 'Soporte Técnico PC', 
                title: 'Mantenimiento Laptop', 
                url: 'https://i.ibb.co/fztHvVdg/EQUIPO-SUCIO-ARANZA.jpg', 
                description: 'Servicio Preventivo: Desensamble completo para limpieza de componentes internos, eliminación de polvo en ductos de ventilación y aplicación de pasta térmica de alto rendimiento para control de temperatura.' 
            },
            {

                title: 'Diagnóstico JetPro',

            },
            { 
                id: 'per-2', 
                category: 'Servicio de Periféricos', 
                title: 'Cambio de Solenoides', 
                url: 'https://i.ibb.co/gFQn26RT/COPIADORA-JETPRO1.jpg',

                                <span className="text-slate-100">Status: Disponible</span>
                            </div>
                            <div className="flex gap-4 md:gap-8 text-slate-400">
                                <a href="#" className="hover:text-blue-400 transition-colors">Inicio</a>
                                <a href="#habilidades" className="hover:text-blue-400 transition-colors">Conocimientos</a>
                                <a href="#evidencia" className="hover:text-blue-400 transition-colors">Evidencia</a>
                                <a href="#contacto" className="hover:text-blue-400 transition-colors">Contacto</a>
                            </div>
                        </div>
                    </nav>

                    <header className="container mx-auto px-6 pt-32 pb-16 md:pt-52 md:pb-36 flex flex-col md:flex-row items-center gap-10 md:gap-16">
                        <div className="flex-1 text-center md:text-left order-2 md:order-1 fade-in-up">
                            <h1 className="hero-title text-6xl sm:text-7xl md:text-8xl lg:text-[100px] font-black text-white tracking-tighter mb-4 italic mx-auto md:mx-0">
