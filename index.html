    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #080c14;

        }

<body>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const CanvasBackground = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationId;
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize);
                resize();
                const particles = Array.from({ length: 45 }, () => ({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2, size: Math.random() * 1.5 + 1
                }));
                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                    particles.forEach((p) => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    });
                    animationId = requestAnimationFrame(draw);
                };
                draw();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationId); };
            }, []);
            return <canvas ref={canvasRef} className="canvas-container" />;
        };

        // --- DATOS DEL PORTAFOLIO ---

                ],
                description: 'Programación: Creación de interfaces modernas integrando modelos de lenguaje (IA) para el desarrollo de aplicaciones de entretenimiento o de productividad.'
            },

                id: 'pc-maint', 
                category: 'Soporte Técnico PC',

                    { url: 'https://i.ibb.co/XxkWC5R5/CAMBIO-DE-DISCO-A-SSD.jpg', label: 'Actualización a unidad SSD para alta velocidad' },
                    { url: 'https://i.ibb.co/fztHvVdg/EQUIPO-SUCIO-ARANZA.jpg', label: 'Limpieza profunda preventiva (Estado Inicial)' },

        // --- MODAL CON NAVEGACIÓN ---
